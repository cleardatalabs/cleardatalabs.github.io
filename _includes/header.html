<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="ClearDataLabs" width="36" height="36">
      ClearDataLabs
    </a>
    <nav class="site-nav">
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url == '/projects/' %} class="active"{% endif %}>Projects</a>
      <a href="{{ '/articles/' | relative_url }}"{% if page.url contains '/articles' %} class="active"{% endif %}>Articles</a>
      <a href="{{ '/contact/' | relative_url }}"{% if page.url == '/contact/' %} class="active"{% endif %}>Contact</a>
    </nav>
  </div>
</header>
