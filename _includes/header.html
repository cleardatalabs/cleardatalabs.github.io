<header class="site-header">
  <div class="site-header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="ClearDataLabs" width="36" height="36">
      ClearDataLabs
    </a>
    <nav class="site-nav">
      <a class="nav-link{% if page.url == '/about/' %} active{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
      <a class="nav-link{% if page.url == '/projects/' %} active{% endif %}" href="{{ '/projects/' | relative_url }}">Projects</a>
      <a class="nav-link{% if page.url contains '/articles' %} active{% endif %}" href="{{ '/articles/' | relative_url }}">Articles</a>
      <a class="nav-link{% if page.url == '/contact/' %} active{% endif %}" href="{{ '/contact/' | relative_url }}">Contact</a>
    </nav>
  </div>
</header>
