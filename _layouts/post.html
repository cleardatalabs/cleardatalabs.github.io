---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%B %-d, %Y" }}
    </time>
    {% if page.series %}
      <span class="post-series">{{ page.series }}</span>
    {% endif %}
    {% if page.demo_url %}
      <a class="post-demo-link" href="{{ page.demo_url }}" target="_blank" rel="noopener">Live Demo &rarr;</a>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="/articles/">&larr; All articles</a>
  </footer>
</article>
