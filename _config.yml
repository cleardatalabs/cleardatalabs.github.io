title: "ClearDataLabs"
description: "AI, neural networks, and browser demos — explained from scratch."
url: "https://cleardatalabs.com"
baseurl: ""

author:
  name: "Kostiantyn Chumychkin"
  github: "kchumichkin"
  linkedin: "kchumichkin"
  url: "https://cleardatalabs.com/about/"

twitter:
  username: "cleardatalabs"
  card: "summary_large_image"
github_username: "cleardatalabs"
logo: /assets/img/logo.png

social:
  name: "Kostiantyn Chumychkin"
  links:
    - "https://github.com/kchumichkin"
    - "https://linkedin.com/in/kchumichkin"
    - "https://twitter.com/cleardatalabs"

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/ai.gif
  - scope:
      path: ""
      type: "posts"
    values:
      image: /assets/img/ai.gif

markdown: kramdown
highlighter: rouge
permalink: /articles/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - CNAME

exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/
